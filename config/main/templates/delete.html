<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Confirmation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .delete-box {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }

    .delete-box h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .delete-box p {
      margin-bottom: 25px;
      color: #555;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 0 10px;
      font-size: 14px;
    }

    .btn-danger {
      background-color: #e74c3c;
      color: #fff;
    }

    .btn-danger:hover {
      background-color: #c0392b;
    }

    .btn-cancel {
      background-color: #bdc3c7;
      color: #333;
    }

    .btn-cancel:hover {
      background-color: #95a5a6;
    }
  </style>
</head>
<body>
  <div class="delete-box">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'upload' %}" class="btn btn-cancel">Cancel</a>
    </form>
  </div>
</body>

</html>

</body>
</html>
